name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true

      - name: Build all platforms
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-X main.version=${VERSION} -s -w"
          mkdir -p dist

          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/claude-stats-linux-amd64   ./cmd/claude-stats
          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/claude-stats-linux-arm64   ./cmd/claude-stats
          GOOS=darwin  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/claude-stats-darwin-amd64  ./cmd/claude-stats
          GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/claude-stats-darwin-arm64  ./cmd/claude-stats
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/claude-stats-windows-amd64.exe ./cmd/claude-stats
          GOOS=windows GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/claude-stats-windows-arm64.exe ./cmd/claude-stats

          chmod +x dist/claude-stats-linux-* dist/claude-stats-darwin-*

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Sign checksums
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          echo "$SIGNING_KEY" | base64 -d > /tmp/signing.pem
          openssl pkey -in /tmp/signing.pem -noout
          openssl pkeyutl -sign -inkey /tmp/signing.pem -rawin -in dist/checksums.txt \
            | xxd -p -c 256 | tr -d '\n' > dist/checksums.txt.sig
          rm /tmp/signing.pem
          echo "signature: $(cat dist/checksums.txt.sig)"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/claude-stats-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Install

            **Linux / macOS / Git Bash:**
            ```sh
            curl -fsSL https://raw.githubusercontent.com/AgusRdz/claude-stats/main/install.sh | sh
            ```

            **Windows PowerShell:**
            ```powershell
            irm https://raw.githubusercontent.com/AgusRdz/claude-stats/main/install.ps1 | iex
            ```

            **Go:**
            ```sh
            go install github.com/Andrevops/claude-stats/cmd/claude-stats@latest
            ```

            ## Verify

            ```sh
            # Verify build provenance
            gh attestation verify claude-stats-linux-amd64 --repo Andrevops/claude-stats

            # Verify checksum signature (requires public_key.pem from repo)
            curl -fsSL https://raw.githubusercontent.com/Andrevops/claude-stats/main/public_key.pem -o public_key.pem
            xxd -r -p checksums.txt.sig | openssl pkeyutl -verify -pubin -inkey public_key.pem -rawin -in checksums.txt -sigfile /dev/stdin
            ```
