<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="line" x1="40" y1="80" x2="216" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.06">
    <line x1="0" y1="80" x2="256" y2="80" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="256" y2="120" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="256" y2="160" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="256" y2="200" stroke="#94a3b8" stroke-width="0.5"/>
  </g>

  <!-- Bar chart -->
  <rect x="44" y="148" width="28" height="60" rx="4" fill="url(#bar1)" opacity="0.9"/>
  <rect x="84" y="108" width="28" height="100" rx="4" fill="url(#bar2)" opacity="0.9"/>
  <rect x="124" y="128" width="28" height="80" rx="4" fill="url(#bar3)" opacity="0.9"/>
  <rect x="164" y="88" width="28" height="120" rx="4" fill="url(#bar4)" opacity="0.9"/>

  <!-- Trend line -->
  <polyline points="58,140 98,100 138,118 178,78 218,58"
    stroke="url(#line)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>

  <!-- Trend line dots -->
  <circle cx="58" cy="140" r="4" fill="#f472b6"/>
  <circle cx="98" cy="100" r="4" fill="#f472b6"/>
  <circle cx="138" cy="118" r="4" fill="#f472b6"/>
  <circle cx="178" cy="78" r="4" fill="#f472b6"/>
  <circle cx="218" cy="58" r="4" fill="#f472b6"/>

  <!-- Terminal prompt at bottom -->
  <g opacity="0.5">
    <text x="44" y="235" font-family="monospace" font-size="16" fill="#38bdf8" font-weight="bold">$ claude-stats</text>
  </g>

  <!-- Sparkle -->
  <circle cx="218" cy="52" r="2" fill="#fbbf24" opacity="0.7"/>
  <circle cx="210" cy="46" r="1.5" fill="#fbbf24" opacity="0.5"/>
</svg>
